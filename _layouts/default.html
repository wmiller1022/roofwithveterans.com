<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Veterans Restoration of Louisville</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; max-width: 100%; overflow-x: hidden; }
    /* Suppress GitHub Pages / Cayman theme injections */
    .container-lg { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
    .px-3 { padding-left: 0 !important; padding-right: 0 !important; }
    .my-5 { margin-top: 0 !important; margin-bottom: 0 !important; }
    .markdown-body { max-width: 100% !important; padding: 0 !important; }
    .page-header { display: none !important; }
    h1.project-name, .project-name, .project-tagline { display: none !important; }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
