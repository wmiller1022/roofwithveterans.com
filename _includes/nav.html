<style>
  nav {
    background: rgba(15, 15, 35, 0.97);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 999;
    border-bottom: 3px solid #B22222;
    height: 75px;
  }
  .nav-brand { display: flex; align-items: center; flex-shrink: 0; text-decoration: none; }
  nav img.logo {
    height: 58px;
    width: auto;
    display: block;
    transition: opacity 0.2s;
  }
  .nav-brand:hover img.logo { opacity: 0.85; }
  nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
    align-items: center;
  }
  nav ul li { position: relative; }
  nav ul li a {
    color: white;
    text-decoration: none;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 0;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  nav ul li a:hover { color: #B22222; border-bottom: 2px solid #B22222; }

  /* Red CTA */
  .nav-cta {
    background: #B22222 !important;
    color: white !important;
    padding: 10px 16px !important;
    border-radius: 3px;
    border-bottom: none !important;
  }
  .nav-cta:hover { background: #8B0000 !important; color: white !important; border-bottom: none !important; }

  /* Navy Portal button */
  .nav-portal {
    background: #1a3a6b !important;
    color: white !important;
    padding: 9px 13px !important;
    font-size: 15px !important;
    border-radius: 3px;
    border-bottom: none !important;
    display: flex !important;
    align-items: center;
    gap: 6px;
  }
  .nav-portal:hover { background: #122d55 !important; color: white !important; border-bottom: none !important; }

  /* "More" dropdown */
  .nav-more-btn {
    color: white;
    text-decoration: none;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 0;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .nav-more-btn:hover { color: #B22222; }
  .nav-more-btn .caret { font-size: 10px; transition: transform 0.2s; display: inline-block; }
  .nav-more-btn.active .caret { transform: rotate(180deg); }
  .dropdown-menu {
    display: none;
    position: absolute;
    top: calc(100% + 14px);
    right: 0;
    background: #0f0f23;
    border: 1px solid rgba(255,255,255,0.12);
    border-top: 3px solid #B22222;
    border-radius: 0 0 4px 4px;
    min-width: 180px;
    z-index: 1000;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .dropdown-menu.open { display: block; }
  .dropdown-menu a {
    display: block;
    color: rgba(255,255,255,0.85) !important;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 13px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    text-decoration: none;
    transition: all 0.15s;
  }
  .dropdown-menu a:last-child { border-bottom: none; }
  .dropdown-menu a:hover { background: #B22222; color: white !important; padding-left: 26px; }

  /* Hamburger */
  .hamburger {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    border-radius: 3px;
  }
  .hamburger span {
    display: block;
    width: 26px; height: 2px;
    background: white;
    border-radius: 2px;
    transition: all 0.3s ease;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* Mobile slide-down menu */
  .mobile-menu {
    display: none;
    position: fixed;
    top: 75px; left: 0; right: 0;
    background: #0a0a20;
    border-bottom: 3px solid #B22222;
    z-index: 998;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.35s ease;
  }
  .mobile-menu.open { display: block; max-height: 560px; }
  .mobile-menu ul { list-style: none; }
  .mobile-menu ul li a {
    display: block;
    color: rgba(255,255,255,0.85);
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-decoration: none;
    padding: 15px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    transition: all 0.2s;
  }
  .mobile-menu ul li a:hover,
  .mobile-menu ul li a:active { background: #B22222; color: white; padding-left: 32px; }
  .mobile-menu ul li a.mobile-portal-link {
    background: rgba(26,58,107,0.4);
    color: #7ab3f5;
  }
  .mobile-menu ul li a.mobile-portal-link:hover { background: #1a3a6b; color: white; }
  .mobile-menu-phone {
    display: block;
    text-align: center;
    padding: 16px;
    color: #ffcc00;
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
    background: rgba(178,34,34,0.15);
    text-decoration: none;
  }

  @media (max-width: 900px) {
    nav { padding: 0 20px; }
    nav ul { display: none; }
    .hamburger { display: flex; }
  }
  @media (max-width: 600px) {
    nav { height: 64px; }
    nav img.logo { height: 50px; }
    .mobile-menu { top: 64px; }
  }
</style>
