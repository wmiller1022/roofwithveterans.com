  :root{

  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:Arial, Helvetica, sans-serif; color:var(--ink); background:#f3f1e8;}
  header{ background:var(--navy); color:#fff; padding:20px; text-align:center; border-bottom:4px solid var(--gold);}
  header h1{ margin:0; font-size:18px; letter-spacing:.5px;}
  header .sub{ font-size:11px; color:var(--gold); font-weight:bold; letter-spacing:1px; margin-top:4px;}
  main{ max-width:520px; margin:0 auto; padding:20px 16px 60px;}
  .card{ background:#fff; border:1px solid var(--line); border-radius:8px; padding:20px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.06);}
  h2{ color:var(--navy); font-size:16px; margin:0 0 10px;}
  p{ line-height:1.5; font-size:14px;}
  textarea{ width:100%; min-height:110px; border:1px solid var(--line); border-radius:6px; padding:10px; font-size:15px; font-family:inherit;}
  input[type=text]{ width:100%; border:1px solid var(--line); border-radius:6px; padding:9px 10px; font-size:14px; font-family:inherit;}
  label{ font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:#555; font-weight:bold; display:block; margin-bottom:4px;}
  .field{ margin-bottom:12px;}
  button{ cursor:pointer; border:none; border-radius:6px; padding:12px 16px; font-size:14px; font-weight:bold; width:100%;}
  .btn-primary{ background:var(--gold); color:var(--navy);}
  .btn-navy{ background:var(--navy); color:#fff;}
  .btn-outline{ background:#fff; color:var(--navy); border:2px solid var(--navy);}
  .btn-row{ display:flex; gap:10px; margin-top:10px;}
  .btn-row button{ flex:1;}
  .platform-btn{ display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:10px;}
  .platform-google{ background:#4285F4; color:#fff;}
  .platform-facebook{ background:#1877F2; color:#fff;}
  .platform-bbb{ background:#0033A0; color:#fff;}
  .note{ font-size:12px; color:#666; margin-top:6px;}
  .status{ font-size:13px; margin-top:8px; color:var(--navy); font-weight:bold; min-height:16px;}
  .photo-grid{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;}
  .photo-grid img{ width:90px; height:90px; object-fit:cover; border-radius:6px; border:2px solid var(--line); cursor:pointer;}
  .photo-grid img.selected{ border-color:var(--gold); box-shadow:0 0 0 2px var(--gold);}
  .draft-box{ background:var(--parchment); border:1px solid var(--gold); border-radius:6px; padding:12px; margin-top:10px;}
  .hidden{ display:none !important;}
  #qrHolder{ display:flex; justify-content:center; padding:14px 0;}
  .foot{ text-align:center; font-size:11px; color:#8a8a78; margin-top:10px;}
  .step-label{ font-size:11px; font-weight:bold; color:var(--red); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px;}
</style>

<script>
/* ================= CONFIG — fill these in ================= */
// TODO(Wes): paste real values below before this goes live. See Part 2
// of the Baby Steps Guide for how to find each one. Any field left
// blank simply won't render that button on the customer view.
const CONFIG = {
  BACKEND_URL: "",              // Level 3 only — Vercel function URL, e.g. https://gunny-chatbot.vercel.app/api/review-assist  (leave blank to disable "help me word it")
  GOOGLE_PLACE_ID: "",          // TODO: VRL's Google Place ID — powers the direct "write a review" link
  FACEBOOK_PAGE_URL: "",        // TODO: e.g. https://www.facebook.com/roofwithveterans/reviews
  BBB_PROFILE_URL: "",          // TODO: VRL's BBB business profile URL
  SITE_BASE_URL: "https://roofwithveterans.com/review.html", // where this page will live once hosted — matches Section 2.3 of VeteransOS Master Index
  REFERRAL_TEXT: "If you ever need a roof, siding, or gutters — Veterans Restoration of Louisville treated us right. Veteran-owned, easy to work with. (502) 919-0278 / roofwithveterans.com"
};
/* ============================================================ */

function qs(name){ return new URLSearchParams(location.search).get(name); }
function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function copyText(text){
  navigator.clipboard.writeText(text).then(()=>{}).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove();
  });
}

const isAdmin = qs('admin') === '1';
const app = document.getElementById('app');

/* ================= CUSTOMER VIEW ================= */
function renderCustomer(){
  const name = qs('name') || 'there';
  const moment = qs('moment') || 'paid'; // 'inspection' | 'paid'
  const jobId = qs('job') || '';
  const photoParams = [qs('p1'), qs('p2'), qs('p3')].filter(Boolean);

  const prompt = moment === 'inspection'
    ? `Hey ${esc(name)} — thanks for letting us take a look at your place. Were you impressed with what you saw so far?`
    : `Hey ${esc(name)} — thanks for trusting us with your home. Now that the job's wrapped up, would you recommend us to a friend or neighbor?`;

  app.innerHTML = `
    <div class="card">
      <h2>Tell us how it went</h2>
      <p>${prompt}</p>
      <p class="note">Type below, or tap the microphone on your phone's keyboard to talk-to-text. A few sentences is plenty.</p>
      <div class="field">
        <textarea id="rawText" placeholder="It was great because..."></textarea>
      </div>
      <button class="btn-primary" id="wordItBtn" ${CONFIG.BACKEND_URL ? '' : 'disabled'}>Help me word it</button>
      ${CONFIG.BACKEND_URL ? '' : '<p class="note">(Wording assistant not connected yet — you can still submit your review as written.)</p>'}
      <div class="status" id="wordStatus"></div>
      <div class="draft-box hidden" id="draftBox">
        <div class="step-label">Your review — edit anything before you post it</div>
        <textarea id="finalText"></textarea>
        <button class="btn-navy" id="approveBtn" style="margin-top:10px;">Looks good — I'm ready to post</button>
      </div>
    </div>

    <div class="card hidden" id="postCard">
      <h2>Post it in one tap</h2>
      <p class="note">Tapping a button below copies your review and opens that site — just paste it in.</p>
      ${CONFIG.GOOGLE_PLACE_ID ? `<button class="platform-btn platform-google" id="btnGoogle">⭐ Post to Google</button>` : ''}
      ${CONFIG.FACEBOOK_PAGE_URL ? `<button class="platform-btn platform-facebook" id="btnFacebook">👍 Post to Facebook</button>` : ''}
      ${CONFIG.BBB_PROFILE_URL ? `<button class="platform-btn platform-bbb" id="btnBBB">🛡 Post to BBB</button>` : ''}
      ${CONFIG.BBB_PROFILE_URL ? '<p class="note">BBB requires you to verify your identity on their site — it takes a couple extra minutes, but it means a lot.</p>' : ''}
    </div>

    ${photoParams.length ? `
    <div class="card">
      <h2>Add a photo (optional)</h2>
      <p class="note">Tap to select, then long-press / save to your camera roll to attach it to your review.</p>
      <div class="photo-grid" id="photoGrid"></div>
    </div>` : ''}

    <div class="card">
      <h2>Know someone who needs a roof?</h2>
      <p class="note">Send this to a friend or neighbor:</p>
      <textarea readonly style="min-height:70px;">${esc(CONFIG.REFERRAL_TEXT)}</textarea>
      <div class="btn-row">
        <button class="btn-outline" id="copyReferral">Copy</button>
        <button class="btn-outline hidden" id="shareReferral">Share</button>
      </div>
    </div>

    <div class="foot">(502) 919-0278 &nbsp;·&nbsp; roofwithveterans.com</div>
  `;

  if(photoParams.length){
    const grid = document.getElementById('photoGrid');
    photoParams.forEach(url=>{
      const img = document.createElement('img');
      img.src = url;
      img.onclick = ()=> img.classList.toggle('selected');
      grid.appendChild(img);
    });
  }

  document.getElementById('wordItBtn').onclick = async ()=>{
    const raw = document.getElementById('rawText').value.trim();
    if(!raw){ alert('Type a few words first.'); return; }
    const status = document.getElementById('wordStatus');
    status.textContent = 'Cleaning up your words...';
    try{
      const res = await fetch(CONFIG.BACKEND_URL, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ text: raw, name, moment })
      });
      const data = await res.json();
      document.getElementById('finalText').value = data.draft || raw;
      document.getElementById('draftBox').classList.remove('hidden');
      status.textContent = '';
    }catch(err){
      status.textContent = "Couldn't reach the wording assistant — your original words are ready to post as-is.";
      document.getElementById('finalText').value = raw;
      document.getElementById('draftBox').classList.remove('hidden');
    }
  };

  document.getElementById('approveBtn').onclick = ()=>{
    document.getElementById('postCard').classList.remove('hidden');
    document.getElementById('postCard').scrollIntoView({behavior:'smooth'});
  };

  const getFinal = ()=> document.getElementById('finalText') ? document.getElementById('finalText').value : document.getElementById('rawText').value;

  const gBtn = document.getElementById('btnGoogle');
  if(gBtn) gBtn.onclick = ()=>{ copyText(getFinal()); window.open(`https://search.google.com/local/writereview?placeid=${CONFIG.GOOGLE_PLACE_ID}`,'_blank'); };
  const fBtn = document.getElementById('btnFacebook');
  if(fBtn) fBtn.onclick = ()=>{ copyText(getFinal()); window.open(CONFIG.FACEBOOK_PAGE_URL,'_blank'); };
  const bBtn = document.getElementById('btnBBB');
  if(bBtn) bBtn.onclick = ()=>{ copyText(getFinal()); window.open(CONFIG.BBB_PROFILE_URL,'_blank'); };

  document.getElementById('copyReferral').onclick = ()=> copyText(CONFIG.REFERRAL_TEXT);
  if(navigator.share){
    const shareBtn = document.getElementById('shareReferral');
    shareBtn.classList.remove('hidden');
    shareBtn.onclick = ()=> navigator.share({ text: CONFIG.REFERRAL_TEXT }).catch(()=>{});
  }
}

/* ================= ADMIN VIEW ================= */
function renderAdmin(){
  app.innerHTML = `
    <div class="card">
      <h2>Generate a Review Link / QR</h2>
      <div class="field"><label>Customer First Name</label><input type="text" id="a_name" placeholder="Nikki"></div>
      <div class="field"><label>Moment</label>
        <select id="a_moment" style="width:100%; padding:9px; border-radius:6px; border:1px solid var(--line);">
          <option value="paid">Job Complete / Paid in Full</option>
          <option value="inspection">Post-Inspection</option>
        </select>
      </div>
      <div class="field"><label>Job # (optional)</label><input type="text" id="a_job" placeholder="VRL-1014"></div>
      <div class="field"><label>Photo URL 1 (optional — public link, e.g. from Drive "share")</label><input type="text" id="a_p1"></div>
      <div class="field"><label>Photo URL 2 (optional)</label><input type="text" id="a_p2"></div>
      <div class="field"><label>Photo URL 3 (optional)</label><input type="text" id="a_p3"></div>
      <button class="btn-primary" id="genBtn">Generate</button>
    </div>

    <div class="card hidden" id="resultCard">
      <h2>Ready to share</h2>
      <div class="field"><label>Link</label><input type="text" id="genLink" readonly></div>
      <button class="btn-outline" id="copyLink">Copy Link</button>
      <div id="qrHolder"></div>
      <button class="btn-navy" id="downloadQR">Download QR (PNG)</button>
      <p class="note">Print this on the inspection report, the paid invoice, a yard-sign flyer — anywhere a customer will see it after a good experience.</p>
    </div>
  `;

  document.getElementById('genBtn').onclick = ()=>{
    const name = document.getElementById('a_name').value.trim();
    const moment = document.getElementById('a_moment').value;
    const job = document.getElementById('a_job').value.trim();
    const p1 = document.getElementById('a_p1').value.trim();
    const p2 = document.getElementById('a_p2').value.trim();
    const p3 = document.getElementById('a_p3').value.trim();

    const params = new URLSearchParams();
    if(name) params.set('name', name);
    params.set('moment', moment);
    if(job) params.set('job', job);
    if(p1) params.set('p1', p1);
    if(p2) params.set('p2', p2);
    if(p3) params.set('p3', p3);

    const base = CONFIG.SITE_BASE_URL || (location.origin + location.pathname);
    const url = base + '?' + params.toString();

    document.getElementById('genLink').value = url;
    document.getElementById('resultCard').classList.remove('hidden');

    const holder = document.getElementById('qrHolder');
    holder.innerHTML = '';
    new QRCode(holder, { text:url, width:220, height:220, colorDark:"#1B2A4A", colorLight:"#ffffff" });

    document.getElementById('copyLink').onclick = ()=> copyText(url);
    document.getElementById('downloadQR').onclick = ()=>{
      setTimeout(()=>{
        const canvas = holder.querySelector('canvas');
        const img = holder.querySelector('img');
        const dataUrl = canvas ? canvas.toDataURL('image/png') : (img ? img.src : null);
        if(!dataUrl){ alert('QR not ready yet — try again in a second.'); return; }
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = (job || name || 'vrl-review') + '-qr.png';
        a.click();
      }, 150);
    };
  };
}

isAdmin ? renderAdmin() : renderCustomer();
</script>
</body>
</html>
